<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Order Food</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#f8fafc;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .order-box{
      background:white;
      width:100%;
      max-width:600px;
      padding:40px;
      border-radius:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    .order-box h2{
      text-align:center;
      color:#ff7b00;
      font-size:40px;
      margin-bottom:30px;
      font-weight:700;
    }

    .form-control{
      height:55px;
      border-radius:15px;
      border:1px solid #cbd5e1;
      margin-bottom:20px;
      padding-left:15px;
    }

    textarea.form-control{
      height:120px;
      padding-top:15px;
    }

    .form-control:focus{
      box-shadow:none;
      border-color:#ff7b00;
    }

    .btn-order{
      background:#ff7b00;
      color:white;
      border:none;
      width:100%;
      height:55px;
      border-radius:50px;
      font-size:18px;
      font-weight:600;
      transition:0.4s;
    }

    .btn-order:hover{
      background:#e96d00;
    }

    .back-home{
      display:block;
      text-align:center;
      margin-top:20px;
      text-decoration:none;
      color:#475569;
      font-weight:500;
    }

    .back-home:hover{
      color:#ff7b00;
    }

  </style>

</head>
<body>

  <div class="order-box">

    <h2>Place Your Order</h2>

    <form>

      <input type="text" class="form-control" placeholder="Your Name">

      <input type="email" class="form-control" placeholder="Your Email">

      <input type="text" class="form-control" placeholder="Food Item Name">

      <input type="number" class="form-control" placeholder="Quantity">

      <textarea class="form-control" placeholder="Delivery Address"></textarea>

      <button class="btn-order">
        Confirm Order
      </button>

    </form>

    <a href="menu.html" class="back-home">
      ← Back To Menu
    </a>

  </div>

</body>
</html>
